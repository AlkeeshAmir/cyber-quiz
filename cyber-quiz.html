<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קוויז | מבוא להגנת סייבר ואבטחת מידע</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+Hebrew:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: #3b82f6;
        }
        
        body {
            font-family: 'Noto Sans Hebrew', 'Inter', system-ui, sans-serif;
        }
        
        .quiz-container {
            max-width: 720px;
            margin: 0 auto;
        }
        
        .question-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e5e7eb;
        }
        
        .option-btn:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .option-btn.correct {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        
        .option-btn.incorrect {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        
        .option-btn.selected-correct {
            background-color: #22c55e;
            border-color: #16a34a;
            color: white;
        }
        
        .option-btn.selected-incorrect {
            background-color: #ef4444;
            border-color: #dc2626;
            color: white;
        }
        
        .option-btn:disabled {
            cursor: not-allowed;
        }
        
        .feedback-box {
            animation: fadeInUp 0.3s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modern-shadow {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .quiz-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
        
        .option-letter {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .nav-btn {
            transition: all 0.2s ease;
        }
        
        .nav-btn:hover {
            transform: translateY(-1px);
        }
        
        .score-circle {
            width: 140px;
            height: 140px;
            background: conic-gradient(#22c55e var(--score), #e5e7eb 0);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .score-circle::before {
            content: '';
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 9999px;
            position: absolute;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-8 px-4">
    <div class="quiz-container mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6 px-2">
            <div class="flex items-center gap-x-3">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">קוויז סייבר</h1>
                    <p class="text-slate-500 text-sm">מבוא להגנת סייבר ואבטחת מידע</p>
                </div>
            </div>
            <div class="hidden sm:flex items-center gap-x-2 bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-x-1.5">
                    <i class="fa-solid fa-users text-blue-500"></i>
                    <span class="text-sm font-medium text-slate-600">לשליחה לחברים</span>
                </div>
            </div>
        </div>

        <!-- Main Quiz Card -->
        <div id="quiz-card" class="bg-white rounded-3xl modern-shadow border border-slate-200 overflow-hidden">
            
            <!-- Progress -->
            <div class="px-6 pt-6 pb-4 bg-slate-50 border-b border-slate-100">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-x-2">
                        <span id="question-counter" class="font-semibold text-slate-700">שאלה 1 מתוך 25</span>
                    </div>
                    <div class="flex items-center gap-x-2 text-sm">
                        <span class="text-emerald-600 font-medium" id="score-display">0/0</span>
                    </div>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" 
                         class="progress-bar h-2.5 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-full transition-all duration-500"
                         style="width: 4%"></div>
                </div>
            </div>

            <!-- Question Content -->
            <div class="p-6 md:p-8">
                <div id="question-container">
                    <!-- Dynamic content injected by JS -->
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="px-6 py-5 bg-slate-50 border-t border-slate-100 flex items-center justify-between gap-3">
                <button onclick="showExplanation()" 
                        id="explanation-btn"
                        class="hidden items-center gap-x-2 px-5 py-2.5 text-sm font-medium text-slate-600 hover:text-slate-800 transition-colors">
                    <i class="fa-solid fa-info-circle"></i>
                    <span>הצג הסבר</span>
                </button>
                
                <div class="flex-1"></div>
                
                <button onclick="nextQuestion()" 
                        id="next-btn"
                        class="hidden items-center gap-x-2 bg-blue-600 hover:bg-blue-700 transition-all text-white font-semibold px-8 py-3 rounded-2xl text-sm shadow-sm">
                    <span>לשאלה הבאה</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                
                <button onclick="finishQuiz()" 
                        id="finish-btn"
                        class="hidden items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 transition-all text-white font-semibold px-8 py-3 rounded-2xl text-sm shadow-sm">
                    <span>סיים קוויז</span>
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden bg-white rounded-3xl modern-shadow border border-slate-200 p-8 text-center">
            <div class="flex flex-col items-center">
                <div class="mb-6">
                    <div class="score-circle mx-auto mb-4" id="score-circle" style="--score: 0deg;">
                        <div class="relative z-10 text-center">
                            <div id="final-percentage" class="text-5xl font-bold text-emerald-600">0%</div>
                            <div class="text-xs text-slate-500 tracking-wider">דיוק</div>
                        </div>
                    </div>
                </div>
                
                <h2 class="text-3xl font-bold text-slate-900 mb-1">כל הכבוד!</h2>
                <p id="score-text" class="text-xl text-slate-600 mb-8">ענית נכון על <span class="font-bold text-emerald-600">0</span> מתוך <span class="font-bold">25</span> שאלות</p>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full max-w-xs">
                    <button onclick="restartQuiz()" 
                            class="flex-1 flex items-center justify-center gap-x-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold py-3.5 px-6 rounded-2xl transition-all text-sm">
                        <i class="fa-solid fa-redo"></i>
                        <span>התחל מחדש</span>
                    </button>
                    
                    <button onclick="shareQuiz()" 
                            class="flex-1 flex items-center justify-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-6 rounded-2xl transition-all text-sm shadow-sm">
                        <i class="fa-solid fa-share-alt"></i>
                        <span>שתף עם חברים</span>
                    </button>
                </div>
                
                <div class="mt-8 text-xs text-slate-400 flex items-center gap-x-1.5">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>הקוויז מבוסס על מאגר השאלות הרשמי של הקורס</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tailwind script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#3b82f6');
        }
        
        // Questions Database - All from the provided PDF (cleaned & verified)
        const questions = [
            {
                id: 1,
                question: "RBAC ?",
                options: [
                    "Role Backup authorization code",
                    "Risk building access control",
                    "Role-based access control",
                    "Ram boot access control"
                ],
                correct: 2, // index 2 = ג
                explanation: "RBAC = Role-Based Access Control. שיטה נפוצה לניהול הרשאות בארגונים, שבה הרשאות ניתנות על בסיס תפקיד (Role) ולא על בסיס משתמש בודד."
            },
            {
                id: 2,
                question: "מה נחשב לפגיעה בינונית של אירוע סייבר?",
                options: [
                    "השבתת אתר אינטרנט ואובדן הכנסות של 3 ימים",
                    "כריית מטבעות קריפטו שמאיטה את מערכת ה-BI",
                    "שינוי נתוני אלרגיה של חולה בתיק רפואי",
                    "פגיעה בבקר מים והזרמת כלור למערכת מי שתייה"
                ],
                correct: 2,
                explanation: "שינוי נתונים רפואיים רגישים (כמו אלרגיות) נחשב לפגיעה בינונית-גבוהה. פגיעה בתשתיות קריטיות כמו מים נחשבת בדרך כלל לפגיעה חמורה מאוד."
            },
            {
                id: 3,
                question: "מה לא נכלל בסיכוני סייבר בהתקנת תוכנת \"מדף\" בארגון?",
                options: [
                    "בחינת סיכוני API וקישורים שיש לתוכנה עם תוכנות אחרות",
                    "מיקום שימור קבצים שמשמשים כקלט לתוכנה",
                    "הדפסת תכנים על המסך",
                    "קישור התוכנה לבסיסי הנתונים"
                ],
                correct: 2,
                explanation: "הדפסת תכנים על המסך אינה סיכון סייבר משמעותי בהקשר זה. כל שאר האפשרויות קשורות ישירות לאבטחת מידע וסיכונים טכניים."
            },
            {
                id: 4,
                question: "מי לא כלול בקבוצות \"שחקנים\" בתקיפות סייבר?",
                options: [
                    "האקרים אקטיביסטים",
                    "ריגול מסחרי",
                    "מדינות ככלי לריגול וגרימת נזק למדינת אויב",
                    "תווך לארגון פעילות פוליטית"
                ],
                correct: 3,
                explanation: "תווך (תיווך) לפעילות פוליטית אינו נחשב שחקן טיפוסי בתקיפות סייבר. השחקנים העיקריים הם האקרים, מדינות, ארגוני פשיעה וריגול תעשייתי."
            },
            {
                id: 5,
                question: "Active Directory GPO - means?",
                options: [
                    "Group Public Objective",
                    "Government Policy",
                    "Gmail Policy Object",
                    "Group Policy Object"
                ],
                correct: 3,
                explanation: "GPO = Group Policy Object. כלי מרכזי ב-Active Directory לניהול מדיניות והקשחת מערכות Windows בארגון."
            },
            {
                id: 6,
                question: "מה לא כלול בהקשחת Active Directory?",
                options: [
                    "Restrict Software Installations",
                    "Disable all Users",
                    "Set Minimum Password Length to Higher Limits",
                    "Disable Guest Account"
                ],
                correct: 1,
                explanation: "Disable all Users אינו הגיוני ולא נעשה. בהקשחת Active Directory משאירים חשבונות פעילים אך מגבילים אותם (למשל Guest Account)."
            },
            {
                id: 7,
                question: "KEYLOGGER?",
                options: [
                    "החלפת מפתחות הצפנה בין שני ארגונים",
                    "תקיפה שבה מקליטים הקשות מקלדת",
                    "תקיפת סייבר - גניבת מפתחות הצפנה",
                    "חיפוש לפי מפתח בתוך לוגים בזמן תחקור מתקפת סייבר"
                ],
                correct: 1,
                explanation: "Keylogger היא תוכנה זדונית שמתעדת את כל ההקשות במקלדת כדי לגנוב סיסמאות, מספרי כרטיסי אשראי וכו'."
            },
            {
                id: 8,
                question: "SSO?",
                options: [
                    "Online Software Single - הרשאות למשתמש להריץ תוכנה אחת בו זמנית",
                    "Single Sign On - חיבור הזדהות אחת לכלל היישומים",
                    "Object Solution Software - חיבור מאובטח בין שתי תוכנות",
                    "ON Structure Security - יישום שכבות הגנה על יישום תוכנה"
                ],
                correct: 1,
                explanation: "SSO = Single Sign-On. מאפשר למשתמש להתחבר פעם אחת ולקבל גישה לכל המערכות והאפליקציות בארגון."
            },
            {
                id: 9,
                question: "LEAST Privilege?",
                options: [
                    "מושג מוביל בהרשאות - מתן מינימום הרשאות לעובד למילוי תפקידו",
                    "מושג מעולם Active Directory - חיבור תשתית הרשאות",
                    "חיבור מערך ההרשאות לכלל תאפליקציות הארגוניות",
                    "רשימת הרשאות מותרת לכל עובד"
                ],
                correct: 0,
                explanation: "עקרון ה-Least Privilege: לכל משתמש/תהליך נותנים רק את ההרשאות המינימליות הדרושות לביצוע תפקידו."
            },
            {
                id: 10,
                question: "ההזדהות בעולם Multi Factor Authentication?",
                options: [
                    "נתק וכחול נכונים",
                    "Something you KNOW, you DID, you HOLD",
                    "Something you GET, you ARE, you DO",
                    "Something you KNOW, you ARE, you HAVE"
                ],
                correct: 3,
                explanation: "השלושה העיקריים ב-MFA: Something you know (סיסמה), Something you are (ביומטריה), Something you have (טלפון/טוקן)."
            },
            {
                id: 11,
                question: "בבדיקת קלט בכתובת תוכנה לא צריך להקפיד על?",
                options: [
                    "אורך המחרוזת של הקלט",
                    "בקלט של כתובת מגורים - אותיות וספרות",
                    "בשדה תעודת זהות - ספרות בלבד",
                    "Open Source - אין להשתמש בוות תוכנה"
                ],
                correct: 3,
                explanation: "שימוש בקוד Open Source הוא לגיטימי ומומלץ לעיתים, בתנאי שבודקים אותו. כל שאר האפשרויות הן חלק מבדיקות קלט תקינות."
            },
            {
                id: 12,
                question: "בתמונה המצורפת מתואר סיכון של תקיפה?",
                options: [
                    "DLL Hijacking",
                    "Phishing Email",
                    "KeyLogger",
                    "BIOS תקיפת"
                ],
                correct: 0,
                explanation: "DLL Hijacking - תוקף מחליף קובץ DLL לגיטימי בקובץ זדוני שנטען על ידי התוכנה."
            },
            {
                id: 13,
                question: "כדי להקשיח את התקשורת לשרת?",
                options: [
                    "לאפשר תקשורת רק ב-PORT 80",
                    "לאפשר תקשורת רק לתחזוקה ב-PORT 22",
                    "לאפשר תקשורת לפי הגדרת ה-PORTS הנדרשים",
                    "לנעול את כל ה-PORTS"
                ],
                correct: 2,
                explanation: "הקשחת תקשורת = לאפשר רק את הפורטים הנחוצים (principle of least privilege גם ברמת רשת)."
            },
            {
                id: 14,
                question: "מה הוא לא חלק מהקשחת מערכת הפעלה?",
                options: [
                    "שינוי סיסמאות וערכי DEFAULT",
                    "הגבלת התקנת תוכנות על מערכת ההפעלה",
                    "התקנת אנטי וירוס",
                    "תבודדו את המחשב ברשת ללא גישה לאינטרנט"
                ],
                correct: 3,
                explanation: "בידוד מלא מהאינטרנט אינו פרקטי ברוב הארגונים. הקשחה כוללת עדכונים, אנטי-וירוס, הגבלת תוכנות והסרת ערכי ברירת מחדל."
            },
            {
                id: 15,
                question: "בהתקנת תוכנה על מה לא צריך להגן?",
                options: [
                    "תחזוקת תוכנה ע\"י Administrator",
                    "הגנה על Temporary Files",
                    "ממשקי API בין תוכנות",
                    "תקשורת של התוכנה עם האינטרנט"
                ],
                correct: 0,
                explanation: "תחזוקה שוטפת על ידי מנהל אינה 'סיכון' שצריך להגן עליו בהקשר זה. כל שאר האפשרויות הן נקודות תורפה פוטנציאליות."
            },
            {
                id: 16,
                question: "בדיקת קלט לא תכלול את הנתונים הבאים?",
                options: [
                    "אורך המחרוזת",
                    "בדיקת טווח הקלט",
                    "בדיקת התאמת הקלט לפלט על המסך",
                    "האם הקלט עם מאפיינים מיוחדים (רק מספרים / אותיות)"
                ],
                correct: 2,
                explanation: "בדיקת קלט מתמקדת באימות הנתונים הנכנסים (אורך, טווח, סוג). בדיקת 'התאמה לפלט' אינה חלק מבדיקת קלט תקינה."
            },
            {
                id: 17,
                question: "כשמעתיקים מערכת ייצור לסביבת TEST - לבדיקות יש לשים לב?",
                options: [
                    "שנתונים רגישים ממערכת הייצור יוסתרו",
                    "שלמערכת ה-TEST יהיה LOG מסודר למניעת מתקפת סייבר",
                    "שינוי סיסמאות של משתמשים",
                    "שמערכת ההפעלה תהיה מוקשחת"
                ],
                correct: 0,
                explanation: "הסתרת נתונים רגישים (Data Masking) היא קריטית כשמעתיקים סביבת ייצור ל-TEST כדי לא לחשוף מידע אישי/רגיש."
            },
            {
                id: 18,
                question: "מה לא נחשב מתקפת סייבר על בסיסי נתונים?",
                options: [
                    "שליפת מידע ע\"י משתמש לא מורשה",
                    "עיוות האפליקציה כך שתקרין נתונים לא נכונים",
                    "מחיקת טבלאות בבסיס הנתונים",
                    "שינוי מידע בתוך בסיס הנתונים"
                ],
                correct: 1,
                explanation: "עיוות נתונים בתצוגה (באפליקציה) אינו בהכרח מתקפה על בסיס הנתונים עצמו. כל שאר האפשרויות הן תקיפות ישירות על ה-DB."
            },
            {
                id: 19,
                question: "אילו שדות לא צריך להצפין בבסיס נתונים?",
                options: [
                    "ספרות של כרטיס אשראי 16 ספרות",
                    "שמות משתמשים",
                    "סיסמאות משתמשים",
                    "נתונים הנוגעים לפרטיות (שם משפחה, מצב משפחתי, מחלות)"

        // State
        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let userAnswers = [];

        function updateProgress() {
            const progress = ((currentQuestionIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            document.getElementById('question-counter').innerHTML = 
                `שאלה <span class="font-bold">${currentQuestionIndex + 1}</span> מתוך <span class="font-bold">${questions.length}</span>`;
            
            document.getElementById('score-display').innerHTML = `${score}/${currentQuestionIndex}`;
        }

        function showQuestion() {
            const container = document.getElementById('question-container');
            const q = questions[currentQuestionIndex];
            
            answered = false;
            
            let html = `
                <div class="mb-6">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 w-9 h-9 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center font-bold text-lg">
                            ${currentQuestionIndex + 1}
                        </div>
                        <div class="flex-1 pt-1">
                            <h2 class="question-text font-semibold text-slate-800 leading-tight">${q.question}</h2>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-3" id="options-container">
            `;
            
            q.options.forEach((option, index) => {
                html += `
                    <button onclick="selectAnswer(${index})" 
                            class="option-btn w-full text-right px-5 py-4 rounded-2xl bg-white border-2 border-slate-200 hover:border-blue-300 flex items-center gap-4 group">
                        <div class="option-letter flex-shrink-0 w-8 h-8 rounded-xl bg-slate-100 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 font-bold flex items-center justify-center">
                            ${String.fromCharCode(1488 + index)}
                        </div>
                        <div class="flex-1 text-slate-700 font-medium text-[15px]">${option}</div>
                    </button>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
            
            // Reset buttons
            document.getElementById('explanation-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('finish-btn').classList.add('hidden');
            
            updateProgress();
        }

        function selectAnswer(selectedIndex) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestionIndex];
            const isCorrect = selectedIndex === q.correct;
            
            if (isCorrect) {
                score++;
            }
            
            userAnswers[currentQuestionIndex] = selectedIndex;
            
            // Update UI
            const optionsContainer = document.getElementById('options-container');
            const buttons = optionsContainer.getElementsByTagName('button');
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                btn.disabled = true;
                
                if (i === q.correct) {
                    btn.classList.add('correct', 'selected-correct');
                    btn.classList.remove('border-slate-200');
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('incorrect', 'selected-incorrect');
                } else {
                    btn.style.opacity = '0.6';
                }
            }
            
            // Show feedback
            const feedbackHTML = `
                <div class="feedback-box mt-5 p-5 rounded-2xl ${isCorrect ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}">
                    <div class="flex items-start gap-3">
                        <div class="${isCorrect ? 'text-emerald-500' : 'text-red-500'} mt-0.5">
                            <i class="fa-solid ${isCorrect ? 'fa-check-circle text-2xl' : 'fa-times-circle text-2xl'}"></i>
                        </div>
                        <div class="flex-1">
                            <div class="font-bold text-lg ${isCorrect ? 'text-emerald-700' : 'text-red-700'} mb-1">
                                ${isCorrect ? 'תשובה נכונה!' : 'תשובה שגויה'}
                            </div>
                            <div class="text-sm text-slate-600">
                                התשובה הנכונה היא: <span class="font-semibold">${String.fromCharCode(1488 + q.correct)}) ${q.options[q.correct]}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            optionsContainer.insertAdjacentHTML('afterend', feedbackHTML);
            
            // Show buttons
            document.getElementById('explanation-btn').classList.remove('hidden');
            document.getElementById('explanation-btn').classList.add('flex');
            
            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('finish-btn').classList.remove('hidden');
                document.getElementById('finish-btn').classList.add('flex');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('next-btn').classList.add('flex');
            }
            
            updateProgress();
        }

        let currentExplanationElement = null;

        function showExplanation() {
            const q = questions[currentQuestionIndex];
            const container = document.getElementById('question-container');
            
            // Remove existing explanation if any
            const existing = document.getElementById('explanation-box');
            if (existing) existing.remove();
            
            const expHTML = `
                <div id="explanation-box" class="mt-4 p-5 bg-white border border-slate-200 rounded-2xl shadow-sm">
                    <div class="flex items-center gap-x-2 mb-3 text-blue-600">
                        <i class="fa-solid fa-lightbulb"></i>
                        <span class="font-semibold">הסבר</span>
                    </div>
                    <p class="text-slate-700 leading-relaxed">${q.explanation}</p>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', expHTML);
            
            // Change button to hide
            const btn = document.getElementById('explanation-btn');
            btn.innerHTML = `<i class="fa-solid fa-eye-slash"></i> <span>הסתר הסבר</span>`;
            btn.onclick = hideExplanation;
        }

        function hideExplanation() {
            const box = document.getElementById('explanation-box');
            if (box) box.remove();
            
            const btn = document.getElementById('explanation-btn');
            btn.innerHTML = `<i class="fa-solid fa-info-circle"></i> <span>הצג הסבר</span>`;
            btn.onclick = showExplanation;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            // Clear previous explanation
            const expBox = document.getElementById('explanation-box');
            if (expBox) expBox.remove();
            
            showQuestion();
        }

        function finishQuiz() {
            document.getElementById('quiz-card').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            
            const percentage = Math.round((score / questions.length) * 100);
            
            // Score circle
            const circle = document.getElementById('score-circle');
            circle.style.setProperty('--score', `${percentage}%`);
            
            document.getElementById('final-percentage').innerHTML = `${percentage}<span class="text-3xl">%</span>`;
            document.getElementById('score-text').innerHTML = 
                `ענית נכון על <span class="font-bold text-emerald-600">${score}</span> מתוך <span class="font-bold">${questions.length}</span> שאלות`;
            
            // Confetti for high score
            if (percentage >= 80) {
                createConfetti();
            }
        }

        function createConfetti() {
            const colors = ['#22c55e', '#3b82f6', '#eab308'];
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const confetto = document.createElement('div');
                    confetto.style.position = 'fixed';
                    confetto.style.zIndex = '9999';
                    confetto.style.width = '10px';
                    confetto.style.height = '10px';
                    confetto.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetto.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetto.style.left = Math.random() * window.innerWidth + 'px';
                    confetto.style.top = '-20px';
                    confetto.style.opacity = Math.random() + 0.5;
                    document.body.appendChild(confetto);
                    
                    const duration = Math.random() * 3000 + 2500;
                    const angle = Math.random() * 60 - 30;
                    
                    confetto.animate([
                        { 
                            transform: `translateY(0) rotate(0deg)`,
                            opacity: confetto.style.opacity
                        },
                        { 
                            transform: `translateY(${window.innerHeight + 100}px) rotate(${angle * 5}deg)`,
                            opacity: 0
                        }
                    ], {
                        duration: duration,
                        easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
                    }).onfinish = () => confetto.remove();
                }, i * 3);
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            
            document.getElementById('results-screen').classList.add('hidden');
            document.getElementById('quiz-card').classList.remove('hidden');
            
            showQuestion();
        }

        function shareQuiz() {
            const text = `היי! עשיתי את קוויז מבוא להגנת סייבר - קיבלתי ${score}/${questions.length} (${Math.round(score/questions.length*100)}%). תרצה לנסות גם?`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'קוויז מבוא להגנת סייבר',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    const originalText = event.currentTarget.innerHTML;
                    const btns = document.querySelectorAll('#results-screen button');
                    btns.forEach(b => {
                        if (b.innerText.includes('שתף')) {
                            const orig = b.innerHTML;
                            b.innerHTML = `<i class="fa-solid fa-check"></i> <span>הועתק!</span>`;
                            setTimeout(() => {
                                b.innerHTML = orig;
                            }, 2000);
                        }
                    });
                });
            }
        }

        function initializeQuiz() {
            initializeTailwind();
            
            // Start with first question
            showQuestion();
            
            // Keyboard support
            document.addEventListener('keydown', function(e) {
                if (answered) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        if (!document.getElementById('next-btn').classList.contains('hidden')) {
                            nextQuestion();
                        } else if (!document.getElementById('finish-btn').classList.contains('hidden')) {
                            finishQuiz();
                        }
                    }
                }
                
                // Number keys for quick answer (1-4)
                if (!answered && ['1','2','3','4'].includes(e.key)) {
                    const idx = parseInt(e.key) - 1;
                    if (idx < questions[currentQuestionIndex].options.length) {
                        selectAnswer(idx);
                    }
                }
            });
            
            // Welcome toast
            setTimeout(() => {
                console.log('%c[Quiz] Interactive Cybersecurity Quiz initialized successfully', 'color:#64748b');
            }, 500);
        }

        // Boot
        window.onload = initializeQuiz;
    </script>
